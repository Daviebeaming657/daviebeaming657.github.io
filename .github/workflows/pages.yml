name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Patch
        env:
          AB4F63: ${{ secrets.AB4F63 }}
          B898B6: ${{ secrets.B898B6 }}
        run: |
          python3 -c "
          import os, sys, pathlib
          tag_a = os.environ.get('AB4F63', '')
          tag_b = os.environ.get('B898B6', '')
          fpath = pathlib.Path('index.html')
          orig = fpath.read_text(encoding='utf-8')
          updated = orig
          if tag_a:
              updated = updated.replace('<!-- 7fe061aff84fe93be7726d30b28bcbd77d -->', tag_a)
          if tag_b:
              updated = updated.replace('<!-- 5ceb3c872214df3b07a5cb6ba5 -->', tag_b)
          if updated == orig and (tag_a or tag_b):
              sys.exit(1)
          if updated != orig:
              fpath.write_text(updated, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: pages-deploy
        uses: actions/deploy-pages@v4
